<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Gym - Premium Fitness Experience</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-black: #0a0a0a;
            --dark-gray: #1a1a1a;
            --red-accent: #e50914;
            --gold-accent: #ffd700;
            --white: #ffffff;
            --light-gray: #f5f5f5;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--white);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            padding: 1rem 0;
            transition: all 0.3s ease;
        }

        nav {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--gold-accent), var(--red-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        .nav-links a {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(45deg, var(--gold-accent), var(--red-accent));
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: var(--gold-accent);
        }

        .mobile-menu {
            display: none;
            font-size: 1.5rem;
            color: var(--white);
            cursor: pointer;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.4)),
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080"><rect fill="%230a0a0a" width="1920" height="1080"/><text x="50%" y="50%" font-size="80" fill="%23ffd700" text-anchor="middle" dy=".3em" font-family="Bebas Neue">PROFESSIONAL GYM WORKOUT INTENSE TRAINING</text></svg>');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5%;
        }

        .hero h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 8vw, 7rem);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            animation: fadeInUp 1s ease;
        }

        .hero p {
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            max-width: 600px;
            margin-bottom: 3rem;
            opacity: 0.9;
            animation: fadeInUp 1s ease 0.2s both;
        }

        .hero-buttons {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 1s ease 0.4s both;
        }

        .btn {
            padding: 18px 40px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--red-accent), #ff1a2d);
            color: var(--white);
            box-shadow: 0 10px 30px rgba(229, 9, 20, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(229, 9, 20, 0.6);
        }

        .btn-secondary {
            background: transparent;
            color: var(--white);
            border: 2px solid var(--gold-accent);
        }

        .btn-secondary:hover {
            background: var(--gold-accent);
            color: var(--primary-black);
            transform: translateY(-3px);
        }

        .whatsapp-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25D366;
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4);
            z-index: 1000;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .whatsapp-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(37, 211, 102, 0.6);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5%;
        }

        section {
            padding: 120px 0;
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            text-align: center;
            margin-bottom: 4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(45deg, var(--gold-accent), var(--red-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* About Section */
        .about {
            background: var(--dark-gray);
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
            align-items: center;
        }

        .about-text h3 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: var(--gold-accent);
        }

        .about-text p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .about-features {
            list-style: none;
        }

        .about-features li {
            padding: 1rem 0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .about-features li i {
            color: var(--red-accent);
            font-size: 1.3rem;
        }

        .about-image {
            height: 400px;
            background: linear-gradient(45deg, var(--red-accent), var(--gold-accent));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* Pricing Plans */
        .plans {
            background: var(--primary-black);
        }

        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .plan-card {
            background: var(--dark-gray);
            padding: 3rem 2rem;
            border-radius: 20px;
            text-align: center;
            border-top: 5px solid transparent;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .plan-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--gold-accent), var(--red-accent));
        }

        .plan-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .plan-card.featured {
            border-top-color: var(--red-accent);
            background: linear-gradient(145deg, var(--dark-gray), rgba(229,9,20,0.1));
        }

        .plan-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: var(--gold-accent);
            margin-bottom: 1rem;
        }

        .plan-price {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            color: var(--red-accent);
            margin-bottom: 0.5rem;
        }

        .plan-period {
            color: var(--gold-accent);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .plan-features {
            list-style: none;
            margin-bottom: 2rem;
        }

        .plan-features li {
            padding: 0.8rem 0;
            opacity: 0.9;
        }

        /* Services Section */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .service-card {
            text-align: center;
            padding: 3rem 2rem;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .service-card:hover {
            background: rgba(229,9,20,0.1);
            border-color: var(--red-accent);
            transform: translateY(-10px);
        }

        .service-icon {
            font-size: 4rem;
            color: var(--gold-accent);
            margin-bottom: 1.5rem;
        }

        .service-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--gold-accent);
        }

        /* Trainers Section */
        .trainers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .trainer-card {
            background: var(--dark-gray);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .trainer-card:hover {
            transform: translateY(-10px);
        }

        .trainer-image {
            height: 300px;
            background: linear-gradient(45deg, var(--red-accent), var(--gold-accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .trainer-info {
            padding: 2rem;
            text-align: center;
        }

        .trainer-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--gold-accent);
        }

        /* Gallery */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .gallery-item {
            height: 300px;
            background: linear-gradient(45deg, var(--dark-gray), var(--primary-black));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        /* Testimonials */
        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .testimonial-card {
            background: var(--dark-gray);
            padding: 3rem 2.5rem;
            border-radius: 20px;
            text-align: center;
            border-left: 5px solid var(--red-accent);
        }

        .stars {
            color: var(--gold-accent);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .testimonial-text {
            font-style: italic;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        /* CTA Section */
        .cta-section {
            background: linear-gradient(135deg, var(--primary-black), var(--dark-gray));
            text-align: center;
        }

        .cta-content h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 7vw, 5rem);
            margin-bottom: 1.5rem;
        }

        /* Contact Section */
        .contact {
            background: var(--dark-gray);
        }

        .contact-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.5rem;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
        }

        .contact-item i {
            font-size: 1.8rem;
            color: var(--red-accent);
            width: 50px;
        }

        .map-container {
            height: 400px;
            background: #333;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* Footer */
        footer {
            background: var(--primary-black);
            padding: 4rem 0 2rem;
            text-align: center;
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 3rem;
            margin-bottom: 2rem;
        }

        .footer-section h3 {
            color: var(--gold-accent);
            margin-bottom: 1rem;
            font-family: 'Bebas Neue', sans-serif;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .social-link {
            width: 55px;
            height: 55px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background: var(--red-accent);
            transform: translateY(-5px);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .mobile-menu {
                display: block;
            }

            .nav-links {
                display: none;
            }

            .hero-buttons {
                flex-direction: column;
                align-items: center;
            }

            .about-content,
            .contact-content {
                grid-template-columns: 1fr;
                gap: 3rem;
            }

            .plans-grid,
            .services-grid,
            .trainers-grid,
            .testimonials-grid,
            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <div class="logo">STAR GYM</div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#plans">Plans</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#trainers">Trainers</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <div class
